name: Generate Terminal GIF

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      theme:
        description: 'Theme to use (default | macos | debian)'
        required: false
        default: 'default'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install github-readme-terminal requests python-dotenv Pillow

      - name: Install custom color schemes
        run: |
          mkdir -p ~/.config/gifos
          cp ansi_escape_colors.toml ~/.config/gifos/ansi_escape_colors.toml

      - name: Generate GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          THEME: ${{ vars.THEME || inputs.theme || 'default' }}
        run: |
          echo "Theme: $THEME  |  User: $GITHUB_REPOSITORY_OWNER"
          case "$THEME" in
            debian)  python generate_debian.py ;;
            default)
              GIFOS_GENERAL_COLOR_SCHEME=github-dark python generate_with_stats.py
              ;;
            *)       python generate_liquid_glass.py ;;
          esac

          GIFOS_GENERAL_COLOR_SCHEME=github-light \
          GIFOS_FILES_OUTPUT_GIF_NAME=output_light \
          python generate_with_stats.py

      - name: Push GIFs to BAALOC/BAALOC
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          push_gif() {
            local file="$1"
            local dest="assets/$file"
            local repo="BAALOC/BAALOC"
            local sha

            sha=$(gh api "repos/$repo/contents/$dest" --jq '.sha' 2>/dev/null || echo "")
            local content
            content=$(base64 -w 0 "$file")

            if [ -n "$sha" ]; then
              gh api --method PUT "repos/$repo/contents/$dest" \
                -f message="Update terminal GIF [skip ci]" \
                -f content="$content" \
                -f sha="$sha"
            else
              gh api --method PUT "repos/$repo/contents/$dest" \
                -f message="Update terminal GIF [skip ci]" \
                -f content="$content"
            fi
          }

          push_gif output.gif
          push_gif output_light.gif
